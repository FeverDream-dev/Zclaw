services:
  control-plane:
    build:
      context: docker/images/control-plane
      dockerfile: Dockerfile
    image: zclaw/control-plane:dev
    ports:
      - "8080:8080"
      - "8081:8081"
      - "6060:6060"
    volumes:
      - ..:/workspace
      - ./data:/data
    environment:
      - ZCLAW_LOG_LEVEL=debug
      - ZCLAW_DATA_DIR=/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zclaw-net
    labels:
      com.zclaw.environment: development

  browser-worker:
    build:
      context: docker/images/browser-worker
      dockerfile: Dockerfile
    image: zclaw/browser-worker:dev
    ports:
      - "9222:9222"
    shm_size: 2g
    volumes:
      - ..:/workspace
      - ./data:/data
    environment:
      - ZCLAW_LOG_LEVEL=debug
    depends_on:
      - control-plane
    networks:
      - zclaw-net

  tool-worker:
    build:
      context: docker/images/tool-worker
      dockerfile: Dockerfile
    image: zclaw/tool-worker:dev
    volumes:
      - ..:/workspace
      - ./data:/data
    environment:
      - ZCLAW_LOG_LEVEL=debug
    networks:
      - zclaw-net

networks:
  zclaw-net:
    driver: bridge
